<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Debug Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/debug.css') }}">
</head>
<body>
    <div class="container">
        <h1>API Debug Interface</h1>

        <div class="form-group">
            <label for="route-select">Select Route to Call:</label>
            <select id="route-select">
                {% for route in routes %}
                <option value="{{ route.path }}">{{ route.path }}</option>
                {% endfor %}
            </select>
        </div>

        <button onclick="callRoute()">Call Route</button>

        <div class="error" id="error"></div>
    </div>

    <script>
        async function callRoute() {
            const routeSelect = document.getElementById('route-select');
            const route = routeSelect.value;
            const errorDiv = document.getElementById('error');

            errorDiv.style.display = 'none';

            try {
                const response = await fetch(route);

                if (!response.ok) {
                    const error = new Error(`HTTP Error: ${response.status}`);
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                }

                alert(`Route ${route} called successfully`);

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
